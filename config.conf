gap            = 8
border         = 2
insert_bind_limit = 48
normal_bind_limit = 24
command_limit = 10
autostart_limit = 4
bar_height     = 24
bar_position   = bottom
border_focus   = 7aa2f7
border_normal  = 2f3549
bar_bg         = 1a1b26
bar_fg         = c0caf5
bar_accent_bg  = 7aa2f7
bar_accent_fg  = 1a1b26
bar_muted_fg   = 565f89
bar_font       = 9x15
bar_left       = command,title
bar_center     = 
bar_right      = workspaces,battery,clock

# Autostart commands
#autostart = xwallpaper --zoom photo.jpg

# INSERT mode - Super-based keybinds
bind_insert = mod+q = spawn:st
bind_insert = mod+Space = spawn:rofi -show drun
bind_insert = Print = wm:screenshot
bind_insert = mod+c = wm:kill
bind_insert = mod+Escape = wm:mode:normal
bind_insert = mod+Tab = wm:focus_next
bind_insert = mod+f = wm:toggle_fullscreen
bind_insert = mod+v = wm:toggle_float
bind_insert = mod+ctrl+Left = wm:swap_prev
bind_insert = mod+ctrl+Right = wm:swap_next
bind_insert = mod+Left = wm:focus_prev
bind_insert = mod+Right = wm:focus_next
bind_insert = mod+k = wm:focus_up
bind_insert = mod+j = wm:focus_down
bind_insert = mod+Page_Up = wm:workspace_prev
bind_insert = mod+Page_Down = wm:workspace_next
bind_insert = mod+ctrl+Page_Up = wm:move_to_workspace_prev
bind_insert = mod+ctrl+Page_Down = wm:move_to_workspace_next
bind_insert = mod+1 = wm:workspace:1
bind_insert = mod+2 = wm:workspace:2
bind_insert = mod+3 = wm:workspace:3
bind_insert = mod+4 = wm:workspace:4
bind_insert = mod+5 = wm:workspace:5
bind_insert = mod+6 = wm:workspace:6
bind_insert = mod+7 = wm:workspace:7
bind_insert = mod+8 = wm:workspace:8
bind_insert = mod+9 = wm:workspace:9
bind_insert = mod+ctrl+1 = wm:move_to_workspace:1
bind_insert = mod+ctrl+2 = wm:move_to_workspace:2
bind_insert = mod+ctrl+3 = wm:move_to_workspace:3
bind_insert = mod+ctrl+4 = wm:move_to_workspace:4
bind_insert = mod+ctrl+5 = wm:move_to_workspace:5
bind_insert = mod+ctrl+6 = wm:move_to_workspace:6
bind_insert = mod+ctrl+7 = wm:move_to_workspace:7
bind_insert = mod+ctrl+8 = wm:move_to_workspace:8
bind_insert = mod+ctrl+9 = wm:move_to_workspace:9

# NORMAL mode - keys execute instantly
bind_normal = i = wm:mode:insert
bind_normal = Escape = wm:mode:insert

# NORMAL COMMAND mode: (type :command and press Enter)
command = :q! = wm:quit

